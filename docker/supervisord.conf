; Railway 单容器进程编排：php-fpm + nginx + 队列 worker + 调度。
; 由系统 /etc/supervisor/supervisord.conf 通过 [include] 加载本文件。
; 任一进程退出自动重启；日志全部走 stdout/stderr，便于 Railway 收集。

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:queue]
command=php /var/www/html/artisan queue:work redis --queue=geoflow,distribution,theme-replication,trends,default --sleep=1 --tries=1 --timeout=300
directory=/var/www/html
user=www-data
autostart=true
autorestart=true
priority=30
stopwaitsecs=310
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:scheduler]
command=php /var/www/html/artisan schedule:work
directory=/var/www/html
user=www-data
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
